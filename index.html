<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asteroid Shooter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07090f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; gap: 12px; }
  #hud { display: flex; gap: 32px; font-size: 14px; color: rgba(255,255,255,0.45); }
  #hud span { font-weight: 500; color: #fff; }
  #wrap { position: relative; }
  canvas { border: 0.5px solid rgba(255,255,255,0.12); border-radius: 12px; display: block; cursor: none; background: #07090f; }
  #overlay { position: absolute; inset: 0; border-radius: 12px; background: rgba(7,9,15,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #overlay h2 { font-size: 24px; font-weight: 500; color: #fff; letter-spacing: 0.04em; }
  #overlay p { font-size: 14px; color: rgba(255,255,255,0.5); }
  #overlay button { font-size: 14px; padding: 10px 32px; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
  #overlay button:hover { background: rgba(255,255,255,0.2); }
  #ctrl { font-size: 12px; color: rgba(255,255,255,0.25); text-align: center; }
</style>
</head>
<body>

<div id="hud">
  score: <span id="score">0</span>
  &nbsp;&nbsp; lives: <span id="lives">3</span>
  &nbsp;&nbsp; level: <span id="level">1</span>
</div>

<div id="wrap">
  <canvas id="gc" width="680" height="460"></canvas>
  <div id="overlay">
    <h2 id="ot">asteroid field</h2>
    <p id="op">dodge and destroy the asteroids</p>
    <button id="ob" onclick="startGame()">play</button>
  </div>
</div>

<div id="ctrl">arrow keys or WASD to move &nbsp;|&nbsp; space or click to shoot &nbsp;|&nbsp; mouse to aim</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 680, H = 460;
const overlay = document.getElementById('overlay');

let ship, bullets, asteroids, particles, score, lives, level;
let gameRunning, animId, keys, mouseX, mouseY, shootCooldown, spawnTimer, invincible;

const SHIP_SIZE = 14;
const BULLET_SPEED = 7;
const SHIP_ACCEL = 0.22;
const FRICTION = 0.97;
const MAX_SPEED = 5.5;

function startGame() {
  overlay.style.display = 'none';
  score = 0; lives = 3; level = 1; gameRunning = true;
  keys = {}; mouseX = W / 2; mouseY = H / 2;
  shootCooldown = 0; spawnTimer = 0; invincible = 0;
  ship = { x: W / 2, y: H / 2, vx: 0, vy: 0, angle: -Math.PI / 2, thrusting: false };
  bullets = []; asteroids = []; particles = [];
  updateHUD();
  spawnWave();
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = level;
}

function spawnWave() {
  const count = 3 + level;
  for (let i = 0; i < count; i++) spawnAsteroid();
}

function spawnAsteroid(x, y, size) {
  size = size || (Math.random() < 0.5 ? 38 : 52);
  if (x === undefined) {
    const side = Math.floor(Math.random() * 4);
    x = side === 0 ? Math.random() * W : side === 1 ? W : side === 2 ? Math.random() * W : 0;
    y = side === 0 ? 0 : side === 1 ? Math.random() * H : side === 2 ? H : Math.random() * H;
  }
  const speed = (1.2 + Math.random() * 1.2) * (1 + level * 0.08);
  const angle = Math.random() * Math.PI * 2;
  const verts = 7 + Math.floor(Math.random() * 5);
  const offsets = Array.from({ length: verts }, () => 0.75 + Math.random() * 0.5);
  asteroids.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    size, rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    verts, offsets
  });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color });
  }
}

function shootBullet() {
  if (shootCooldown > 0) return;
  shootCooldown = 12;
  bullets.push({
    x: ship.x + Math.cos(ship.angle) * SHIP_SIZE,
    y: ship.y + Math.sin(ship.angle) * SHIP_SIZE,
    vx: Math.cos(ship.angle) * BULLET_SPEED + ship.vx,
    vy: Math.sin(ship.angle) * BULLET_SPEED + ship.vy,
    life: 58
  });
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function wrap(obj) {
  if (obj.x < 0) obj.x = W;
  if (obj.x > W) obj.x = 0;
  if (obj.y < 0) obj.y = H;
  if (obj.y > H) obj.y = 0;
}

function drawShip() {
  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle + Math.PI / 2);
  const flash = invincible > 0 && Math.floor(invincible / 4) % 2 === 0;
  if (!flash) {
    ctx.strokeStyle = '#5DCAA5';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(0, -SHIP_SIZE);
    ctx.lineTo(SHIP_SIZE * 0.7, SHIP_SIZE * 0.8);
    ctx.lineTo(0, SHIP_SIZE * 0.4);
    ctx.lineTo(-SHIP_SIZE * 0.7, SHIP_SIZE * 0.8);
    ctx.closePath();
    ctx.stroke();
    if (ship.thrusting) {
      ctx.strokeStyle = '#EF9F27';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-SHIP_SIZE * 0.35, SHIP_SIZE * 0.55);
      ctx.lineTo(0, SHIP_SIZE * 0.55 + 6 + Math.random() * 6);
      ctx.lineTo(SHIP_SIZE * 0.35, SHIP_SIZE * 0.55);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.strokeStyle = 'rgba(180,178,169,0.85)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < a.verts; i++) {
    const ang = (i / a.verts) * Math.PI * 2;
    const r = a.size * a.offsets[i];
    i === 0 ? ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r) : ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function loop() {
  if (!gameRunning) return;
  animId = requestAnimationFrame(loop);

  ctx.fillStyle = '#07090f';
  ctx.fillRect(0, 0, W, H);

  const up    = keys['ArrowUp']    || keys['w'] || keys['W'];
  const left  = keys['ArrowLeft']  || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];
  const shooting = keys[' '];

  const dx = mouseX - ship.x, dy = mouseY - ship.y;
  if (Math.hypot(dx, dy) > 8) ship.angle = Math.atan2(dy, dx);

  if (left)  ship.angle -= 0.055;
  if (right) ship.angle += 0.055;

  ship.thrusting = !!up;
  if (up) {
    ship.vx += Math.cos(ship.angle) * SHIP_ACCEL;
    ship.vy += Math.sin(ship.angle) * SHIP_ACCEL;
  }
  ship.vx *= FRICTION;
  ship.vy *= FRICTION;
  const spd = Math.hypot(ship.vx, ship.vy);
  if (spd > MAX_SPEED) { ship.vx = ship.vx / spd * MAX_SPEED; ship.vy = ship.vy / spd * MAX_SPEED; }
  ship.x += ship.vx;
  ship.y += ship.vy;
  wrap(ship);

  if (shooting) shootBullet();
  if (shootCooldown > 0) shootCooldown--;
  if (invincible > 0) invincible--;

  spawnTimer++;
  if (spawnTimer > Math.max(180 - level * 10, 80)) { spawnTimer = 0; spawnAsteroid(); }

  bullets = bullets.filter(b => b.life > 0);
  bullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; wrap(b); });

  asteroids.forEach(a => { a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed; wrap(a); });

  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95; p.life -= 0.035; });

  const toDestroy = new Set();
  const bulletsHit = new Set();
  bullets.forEach((b, bi) => {
    asteroids.forEach((a, ai) => {
      if (bulletsHit.has(bi) || toDestroy.has(ai)) return;
      if (dist(b, a) < a.size * 0.85) {
        bulletsHit.add(bi);
        toDestroy.add(ai);
        spawnParticles(a.x, a.y, '#B4B2A9', 10);
        score += a.size > 40 ? 10 : 25;
        if (a.size > 30) {
          spawnAsteroid(a.x, a.y, Math.round(a.size * 0.52));
          spawnAsteroid(a.x, a.y, Math.round(a.size * 0.52));
        }
      }
    });
  });
  bullets = bullets.filter((_, i) => !bulletsHit.has(i));
  asteroids = asteroids.filter((_, i) => !toDestroy.has(i));

  if (asteroids.length === 0) {
    level++;
    spawnWave();
    spawnParticles(ship.x, ship.y, '#1D9E75', 20);
  }

  if (invincible === 0) {
    for (const a of asteroids) {
      if (dist(ship, a) < a.size * 0.7 + SHIP_SIZE * 0.6) {
        lives--;
        invincible = 120;
        spawnParticles(ship.x, ship.y, '#D85A30', 16);
        ship.vx = 0; ship.vy = 0;
        if (lives <= 0) { gameOver(); return; }
        break;
      }
    }
  }

  updateHUD();

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  bullets.forEach(b => {
    ctx.fillStyle = '#5DCAA5';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
  });

  asteroids.forEach(drawAsteroid);
  drawShip();

  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  for (let i = 0; i < 70; i++) {
    const sx = (i * 137 + 11) % W, sy = (i * 211 + 37) % H;
    ctx.beginPath(); ctx.arc(sx, sy, 0.8, 0, Math.PI * 2); ctx.fill();
  }
}

function gameOver() {
  gameRunning = false;
  overlay.style.display = 'flex';
  document.getElementById('ot').textContent = 'game over';
  document.getElementById('op').textContent = `score: ${score} — reached level ${level}`;
  document.getElementById('ob').textContent = 'play again';
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});

canvas.addEventListener('click', () => { if (gameRunning) shootBullet(); });

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
</script>
</body>
</html>
